<!-- accounts/templates/accounts/password_reset_complete.html -->
{% extends 'base.html' %}
{% load static %}
{% load i18n %}

{% block title %}Senha Alterada - Sistema de Agenda{% endblock %}

{% block content %}
<div class="password-reset-container">
    <div class="row justify-content-center w-100">
        <div class="card password-reset-card shadow-lg border-0">
            <div class="card-body p-5 text-center">
                <div class="password-reset-logo mb-4">
                    <img src="{% static 'img/dever.png' %}" alt="Logo Sistema de Agenda" class="img-fluid">
                </div>
                
                <i class="fas fa-check-circle text-success mb-3" style="font-size: 3rem;"></i>
                <h2 class="password-reset-title">Senha Alterada com Sucesso!</h2>
                
                <p class="text-muted mb-4">
                    Sua senha foi redefinida com sucesso. Agora você pode fazer login com sua nova senha.
                </p>
                
                <div class="d-grid gap-2">
                    <a href="{% url 'login' %}" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt me-2"></i> Fazer Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .password-reset-container {
        min-height: calc(100vh - 120px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
    }
    
    .password-reset-card {
        border-radius: 15px;
        overflow: hidden;
        max-width: 500px;
        width: 100%;
    }
    
    .password-reset-logo {
        max-height: 70px;
        display: flex;
        justify-content: center;
        margin-bottom: 1.5rem;
    }
    
    .password-reset-title {
        font-weight: 600;
        color: #333;
        margin-bottom: 0.5rem;
    }
</style>
{% endblock %}
