{% extends 'base.html' %}
{% block content %}
    
    <div class="container">
        <header>
            <h1>Adicionar Novo Dever de Casa</h1>
        </header>
        
        <form method="post" id="dever-form">
            {% csrf_token %}
            
            <!-- ESCOLA -->
            <div class="form-group">
                <label for="id_fk_escola">Escola:</label>
                <select id="id_fk_escola" name="fk_escola" class="form-control" 
                    {% if user_tipo == 'professor' and professor_obj %}disabled{% endif %}>
                    <option value="">Selecione uma Escola</option>
                    {% for escola in escolas %}
                        <option value="{{ escola.id }}" 
                            {% if user_tipo == 'professor' and professor_obj and professor_obj.fk_escola.id == escola.id %}selected{% endif %}>
                            {{ escola.nome_escola }}
                        </option>
                    {% endfor %}
                </select>
                {% if user_tipo == 'professor' and professor_obj %}
                    <input type="hidden" name="fk_escola" value="{{ professor_obj.fk_escola.id }}">
                {% endif %}
            </div>

            <!-- TURMA -->
            <div class="form-group">
                <label for="id_fk_turma">Turma:</label>
                <select id="id_fk_turma" name="fk_turma" class="form-control">
                    <option value="">Selecione uma Turma</option>
                </select>
            </div>

            <!-- PROFESSOR -->
            <div class="form-group">
                <label for="id_fk_professor">Professor:</label>
                <select id="id_fk_professor" name="fk_professor" class="form-control" 
                    {% if user_tipo == 'professor' and professor_obj %}disabled{% endif %}>
                    <option value="">Selecione um Professor</option>
                </select>
                {% if user_tipo == 'professor' and professor_obj %}
                    <input type="hidden" id="professor_hidden" name="fk_professor" value="{{ professor_obj.id }}">
                {% endif %}
            </div>

            <!-- MATÉRIA -->
            <div class="form-group">
                <label for="id_fk_materia_display">Matéria:</label>
                <input id="id_fk_materia_display" class="form-control" readonly
                    {% if user_tipo == 'professor' and professor_materia %}value="{{ professor_materia.nome_materia }}"{% endif %}>
                <input type="hidden" id="id_fk_materia_id" name="fk_materia" 
                    {% if user_tipo == 'professor' and professor_materia %}value="{{ professor_materia.id }}"{% endif %}>
            </div>

            <!-- LIVRO -->
            <div class="form-group">
                <label for="id_fk_livro">Livro:</label>
                <select id="id_fk_livro" name="fk_livro" class="form-control">
                    <option value="">Selecione um Livro</option>
                </select>
            </div>

            <!-- CONTEÚDO MINISTRADO -->
            <div class="form-group">
                <label for="id_title">Conteúdo Ministrado:</label>
                <textarea id="id_title" name="title" class="form-control"></textarea>
            </div>

            <!-- DATA DO CONTEÚDO -->
            <div class="form-group">
                <label for="id_start_time">Data do conteúdo ministrado:</label>
                <input type="date" id="id_start_time" name="start_time" class="form-control">
            </div>

            <!-- DEVER -->
            <div class="form-group">
                <label for="id_dever">Dever:</label>
                <textarea id="id_dever" name="dever" class="form-control"></textarea>
            </div>

            <!-- DATA DE ENTREGA -->
            <div class="form-group">
                <label for="id_data_entrega">Data de Entrega:</label>
                <input type="date" id="id_data_entrega" name="data_entrega" class="form-control">
            </div>
         
            <button type="submit" class="btn btn-primary mt-3">Salvar</button>
        </form>
    </div>

    <script>
        // Variáveis globais para controle
        const userTipo = "{{ user_tipo }}";
        const professorId = "{{ professor_obj.id|default:'' }}";
        const professorNome = "{{ professor_obj.nome_professor|default:'' }}";
        const professorEscolaId = "{{ professor_obj.fk_escola.id|default:'' }}";
        const professorMateriaId = "{{ professor_materia.id|default:'' }}";
        const professorMateriaNome = "{{ professor_materia.nome_materia|default:'' }}";

        document.addEventListener('DOMContentLoaded', function() {
            // Se for professor, preencher automaticamente os campos
            if (userTipo === 'professor' && professorEscolaId) {
                // Seleciona a escola automaticamente
                const escolaSelect = document.getElementById("id_fk_escola");
                escolaSelect.value = professorEscolaId;
                
                // Carrega turmas da escola do professor
                carregarTurmas(professorEscolaId);
                
                // Carrega professores da escola do professor
                carregarProfessores(professorEscolaId, function() {
                    // Após carregar professores, seleciona o professor atual
                    setTimeout(selecionarProfessorAtual, 500);
                });
            }
        });

        function carregarTurmas(escolaId) {
            fetch(`/get_turmas_by_escola/${escolaId}/`)
                .then(response => response.json())
                .then(data => {
                    const turmaSelect = document.getElementById("id_fk_turma");
                    turmaSelect.innerHTML = '<option value="">Selecione uma Turma</option>';
                    data.forEach(turma => {
                        const option = document.createElement("option");
                        option.value = turma.id;
                        option.textContent = turma.nome;
                        turmaSelect.appendChild(option);
                    });
                })
                .catch(error => console.error('Erro ao carregar turmas:', error));
        }

        function carregarProfessores(escolaId, callback) {
            fetch(`/get_professores_by_escola/${escolaId}/`)
                .then(response => response.json())
                .then(data => {
                    const professorSelect = document.getElementById("id_fk_professor");
                    professorSelect.innerHTML = '<option value="">Selecione um Professor</option>';
                    data.forEach(professor => {
                        const option = document.createElement("option");
                        option.value = professor.id;
                        option.textContent = professor.nome;
                        professorSelect.appendChild(option);
                    });
                    if (callback) callback();
                })
                .catch(error => console.error('Erro ao carregar professores:', error));
        }

        function selecionarProfessorAtual() {
            const professorSelect = document.getElementById("id_fk_professor");
            
            if (professorId) {
                // Tenta encontrar pelo ID exato primeiro
                for (let i = 0; i < professorSelect.options.length; i++) {
                    if (professorSelect.options[i].value === professorId) {
                        professorSelect.value = professorId;
                        document.getElementById("professor_hidden").value = professorId;
                        
                        // Dispara o evento change para carregar a matéria e livros
                        const event = new Event('change');
                        professorSelect.dispatchEvent(event);
                        return;
                    }
                }
                
                // Se não encontrou pelo ID, tenta pelo nome
                for (let i = 0; i < professorSelect.options.length; i++) {
                    if (professorSelect.options[i].textContent.includes(professorNome)) {
                        professorSelect.value = professorSelect.options[i].value;
                        document.getElementById("professor_hidden").value = professorSelect.value;
                        
                        const event = new Event('change');
                        professorSelect.dispatchEvent(event);
                        break;
                    }
                }
            }
        }

        // Event listener para mudança de escola (apenas para coordenadores/admin)
        document.getElementById("id_fk_escola").addEventListener("change", function () {
            if (userTipo === 'coordenador' || userTipo === 'admin' || userTipo === 'superuser') {
                const escolaId = this.value;
                carregarTurmas(escolaId);
                carregarProfessores(escolaId);
                
                // Limpa matéria e livros quando muda a escola
                document.getElementById("id_fk_materia_display").value = '';
                document.getElementById("id_fk_materia_id").value = '';
                document.getElementById("id_fk_livro").innerHTML = '<option value="">Selecione um Livro</option>';
            }
        });
        
        // Event listener para mudança de professor
        document.getElementById("id_fk_professor").addEventListener("change", function () {
            const professorId = this.value;
            
            if (professorId) {
                // Busca a matéria do professor
                fetch(`/get_materia_by_professor/${professorId}/`)
                    .then(response => response.json())
                    .then(data => {
                        if (!data.error) {
                            // Preenche a matéria de exibição e o hidden com o id
                            document.getElementById("id_fk_materia_display").value = data.nome;
                            document.getElementById("id_fk_materia_id").value = data.id;

                            // Busca os livros da matéria e da escola
                            const escolaId = document.getElementById("id_fk_escola").value;
                            fetch(`/get_livros_ajax/${data.id}/${escolaId}/`)
                                .then(response => response.json())
                                .then(livros => {
                                    const livroSelect = document.getElementById("id_fk_livro");
                                    livroSelect.innerHTML = '<option value="">Selecione um Livro</option>';
                                    livros.forEach(livro => {
                                        const option = document.createElement("option");
                                        option.value = livro.id;
                                        option.textContent = livro.nome;
                                        livroSelect.appendChild(option);
                                    });
                                })
                                .catch(error => console.error('Erro ao carregar livros:', error));
                        } else {
                            document.getElementById("id_fk_materia_display").value = '';
                            document.getElementById("id_fk_materia_id").value = '';
                            document.getElementById("id_fk_livro").innerHTML = '<option value="">Selecione um Livro</option>';
                        }
                    })
                    .catch(error => console.error('Erro ao carregar matéria:', error));
            } else {
                document.getElementById("id_fk_materia_display").value = '';
                document.getElementById("id_fk_materia_id").value = '';
                document.getElementById("id_fk_livro").innerHTML = '<option value="">Selecione um Livro</option>';
            }
        });
    </script>
        
{% endblock %}
